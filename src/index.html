<!DOCTYPE html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>TODO BELT</title>

    <base href="/" />

    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0A0A0C" />

    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Brand typography: Inter is the brand font but is not present on
         Android by default (system falls back to Roboto, which renders
         certain glyphs like the uppercase B noticeably lighter at weight
         800). Loading from Google Fonts with preconnect keeps the cold
         start fast on web while ensuring the same wordmark on every
         platform once the font is cached. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />

    <!-- Pre-paint to avoid white flash before Ionic mounts -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0c;
        color: #f4f4f6;
        overscroll-behavior: none;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>

  <body class="dark">
    <app-root></app-root>
  </body>
</html>
